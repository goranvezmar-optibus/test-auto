name: Release Hooks

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Auto release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec auto shipit



name: Release

on:
  push:
    branches: [main, next]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Gemfury auth
        run: |
          npm config set //npm.fury.io/goranvezmar/:_authToken=$FURY_TOKEN
        env:
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}

      - name: Run Auto
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec auto shipit

      - name: Publish to Gemfury
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAG=canary
          elif [[ "${{ github.ref }}" == "refs/heads/next" ]]; then
            TAG=next
          else
            TAG=latest
          fi

          echo "Publishing with tag: $TAG"

          npm publish \
            --registry https://npm.fury.io/goranvezmar/ \
            --tag $TAG